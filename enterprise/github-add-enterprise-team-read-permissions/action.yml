name: 'Add Enterprise Team Read Permissions'
description: 'Grant read permissions to an enterprise team across all organizations in the enterprise'
inputs:
  github-token:
    description: 'PAT with admin:enterprise scope'
    required: true
  enterprise:
    description: 'GitHub Enterprise slug'
    required: true
  enterprise-team-slug:
    description: 'Enterprise team slug (without "ent:" prefix)'
    required: true
  all-repo-read-role-name:
    description: 'Org role name to assign'
    required: false
    default: 'all_repo_read'
  api-url-prefix:
    description: 'GitHub API base URL'
    required: false
    default: 'https://api.github.com'
runs:
  using: composite
  steps:
    - name: Add enterprise team read permissions
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ENTERPRISE: ${{ inputs.enterprise }}
        ENTERPRISE_TEAM_SLUG: ${{ inputs.enterprise-team-slug }}
        ALL_REPO_READ_ROLE_NAME: ${{ inputs.all-repo-read-role-name }}
        API_URL_PREFIX: ${{ inputs.api-url-prefix }}
      run: ${{ github.action_path }}/github-add-enterprise-team-read-permissions.sh
