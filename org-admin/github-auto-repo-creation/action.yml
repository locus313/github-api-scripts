name: 'Auto Repository Creation'
description: 'Create private repositories with branch protection, CODEOWNERS, and team admin access'
inputs:
  github-token:
    description: 'PAT with repo and admin:org scope'
    required: false
  org:
    description: 'GitHub organization name'
    required: true
  repo-names:
    description: 'Comma-separated list of repository names to create'
    required: true
  repo-owners:
    description: 'Comma-separated list of CODEOWNERS team slugs'
    required: true
  admin-teams:
    description: 'Comma-separated team slugs to grant admin access'
    required: false
    default: ''
  api-url-prefix:
    description: 'GitHub API base URL'
    required: false
    default: 'https://api.github.com'
runs:
  using: composite
  steps:
    - name: Create repositories
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
        ORG: ${{ inputs.org }}
        REPO_NAMES: ${{ inputs.repo-names }}
        REPO_OWNERS: ${{ inputs.repo-owners }}
        ADMIN_TEAMS: ${{ inputs.admin-teams }}
        API_URL_PREFIX: ${{ inputs.api-url-prefix }}
      run: ${{ github.action_path }}/github-auto-repo-creation.sh
