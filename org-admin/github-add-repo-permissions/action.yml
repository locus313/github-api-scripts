name: 'Add Repository Permissions'
description: 'Grant team permissions across all repositories in a GitHub organization'
inputs:
  github-token:
    description: 'PAT with admin:org scope'
    required: false
  org:
    description: 'GitHub organization name'
    required: true
  repo-name-filter:
    description: 'Prefix filter for repository names; leave empty to process all repos'
    required: false
    default: ''
  repo-admin:
    description: 'Space-separated team slugs to grant admin access'
    required: false
    default: ''
  repo-maintain:
    description: 'Space-separated team slugs to grant maintain access'
    required: false
    default: ''
  repo-push:
    description: 'Space-separated team slugs to grant push access'
    required: false
    default: ''
  repo-triage:
    description: 'Space-separated team slugs to grant triage access'
    required: false
    default: ''
  repo-pull:
    description: 'Space-separated team slugs to grant pull access'
    required: false
    default: ''
  api-url-prefix:
    description: 'GitHub API base URL'
    required: false
    default: 'https://api.github.com'
runs:
  using: composite
  steps:
    - name: Grant team permissions to repositories
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
        ORG: ${{ inputs.org }}
        REPO_NAME_FILTER: ${{ inputs.repo-name-filter }}
        REPO_ADMIN: ${{ inputs.repo-admin }}
        REPO_MAINTAIN: ${{ inputs.repo-maintain }}
        REPO_PUSH: ${{ inputs.repo-push }}
        REPO_TRIAGE: ${{ inputs.repo-triage }}
        REPO_PULL: ${{ inputs.repo-pull }}
        API_URL_PREFIX: ${{ inputs.api-url-prefix }}
      run: ${{ github.action_path }}/github-add-repo-permissions.sh
